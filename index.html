<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyMoney 個人全方位記帳 (進化版)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Config -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#6324eb",
                        "primary-hover": "#501ac2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#161121",
                        success: "#10b981",
                        danger: "#f43f5e",
                        warning: "#f59e0b",
                        dark: "#120e1b",
                        muted: "#654d99",
                        border: "#d7d0e7"
                    },
                    fontFamily: {
                        display: ["Inter", "Noto Sans TC", "sans-serif"],
                        sans: ["Inter", "Noto Sans TC", "sans-serif"]
                    },
                    padding: {
                        'safe': 'env(safe-area-inset-bottom)',
                        'safe-top': 'env(safe-area-inset-top)'
                    },
                    margin: {
                        'safe-top': 'env(safe-area-inset-top)'
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Mobile Scrollbar hiding */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        .bottom-sheet { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .animate-scale-in { animation: scaleIn 0.2s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Checkbox Animation */
        .checkbox-wrapper input:checked + div {
            background-color: #6324eb;
            border-color: #6324eb;
        }
        .checkbox-wrapper input:checked + div svg {
            display: block;
        }

        .clean-select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: none !important; 
        }
    </style>
</head>
<body class="bg-background-light text-dark antialiased h-screen overflow-hidden selection:bg-primary/20 selection:text-primary">

    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- Utils ---
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
        const formatMoney = (amount) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(amount);
        
        const formatDate = (dateInput) => {
            try {
                if (!dateInput) return '';
                const d = new Date(dateInput);
                if (isNaN(d.getTime())) return '';
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            } catch (e) { return ''; }
        };

        const parseDate = (str) => {
            if(!str) return new Date();
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);
        };

        const getCycleRange = (targetDate, closingDayParam) => {
            const year = targetDate.getFullYear();
            const month = targetDate.getMonth();
            const closingDay = parseInt(closingDayParam) || 1; 

            const lastDayOfCurrentMonth = new Date(year, month + 1, 0).getDate();
            const actualEndDay = Math.min(closingDay, lastDayOfCurrentMonth);
            const end = new Date(year, month, actualEndDay);

            const lastDayOfPrevMonth = new Date(year, month, 0).getDate(); 
            const actualPrevEndDay = Math.min(closingDay, lastDayOfPrevMonth);
            const start = new Date(year, month - 1, actualPrevEndDay);
            start.setDate(start.getDate() + 1);

            return { start, end };
        };

        const getAccountDetailRange = (targetDate, account, defaultClosingDay) => {
            const year = targetDate.getFullYear();
            const month = targetDate.getMonth();

            if (account.type === 'credit' && account.statementDate) {
                const statementDay = parseInt(account.statementDate) || 1; 
                const end = new Date(year, month, statementDay);
                const start = new Date(year, month - 1, statementDay);
                start.setDate(start.getDate() + 1);
                return { start, end };
            } else {
                const closingDay = (parseInt(account.cycleStartDay) || parseInt(defaultClosingDay) || 31);
                return getCycleRange(targetDate, closingDay);
            }
        };

        const Icon = ({ name, className = "", filled = false, size = "text-2xl" }) => (
            <span className={`material-symbols-outlined ${filled ? 'filled' : ''} ${size} ${className} select-none`}>
                {name}
            </span>
        );

        // --- Shared Component: DateController ---
        const DateController = ({ currentDate, onChangeDate, cycleStart, cycleEnd, cycleDay, onCycleDayChange, isCreditCard = false, creditCardInfo = null, showTotal = false, periodTotal = 0 }) => {
            return (
                <div className="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm flex flex-col gap-3 shrink-0">
                    <div className="flex justify-between items-center">
                        <button onClick={() => onChangeDate(-1)} className="p-2 rounded-full hover:bg-gray-100"><Icon name="chevron_left" /></button>
                        <div className="text-center">
                            <div className="font-bold text-lg text-dark">
                                {currentDate.getFullYear()}年 {currentDate.getMonth() + 1}月
                            </div>
                            <div className="text-xs text-gray-500">
                                {formatDate(cycleStart)} ~ {formatDate(cycleEnd)}
                            </div>
                        </div>
                        <button onClick={() => onChangeDate(1)} className="p-2 rounded-full hover:bg-gray-100"><Icon name="chevron_right" /></button>
                    </div>
                    
                    <div className="flex flex-col bg-gray-50 rounded-xl overflow-hidden">
                        <div className={`flex items-center justify-between px-3 py-2 ${showTotal ? 'border-b border-gray-200/50' : ''}`}>
                            {isCreditCard ? (
                                <>
                                    <span className="text-xs text-gray-500 font-medium">{creditCardInfo ? '帳單資訊' : '每月結帳日'}</span>
                                    <div className="text-sm font-bold text-primary">
                                        {creditCardInfo || '依結帳日計算'}
                                    </div>
                                </>
                            ) : (
                                <>
                                    <span className="text-xs text-gray-500 font-medium">每月結帳日</span>
                                    <div className="flex items-center gap-1">
                                        <span className="text-sm font-bold text-primary">每月</span>
                                        <select 
                                            className="bg-transparent bg-none clean-select text-sm font-bold text-primary outline-none border-none p-0 pr-1 text-right cursor-pointer appearance-none text-center" 
                                            value={cycleDay} 
                                            onChange={e => onCycleDayChange(e.target.value)}
                                            style={{ textAlignLast: 'center' }} 
                                        >
                                            {[...Array(31)].map((_, i) => <option key={i+1} value={i+1}>{i+1}</option>)}
                                        </select>
                                        <span className="text-sm font-bold text-primary">號</span>
                                    </div>
                                </>
                            )}
                        </div>
                        {showTotal && (
                            <div className="flex items-center justify-between px-3 py-2 bg-gray-50/50">
                                <span className="text-xs text-gray-500 font-medium">區間總額</span>
                                <span className={`text-sm font-bold ${periodTotal > 0 ? 'text-success' : periodTotal < 0 ? 'text-danger' : 'text-dark'}`}>
                                    {periodTotal > 0 ? '+' : ''}{formatMoney(periodTotal)}
                                </span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- Shared Component: Transaction Item (New Design) ---
        const TransactionItem = ({ t, onClick, accounts, showAccountBadge = false }) => {
            const getAvatarInfo = (type) => {
                if (type === 'transfer') return { bg: 'bg-blue-50', color: 'text-primary' };
                if (type === 'income') return { bg: 'bg-green-50', color: 'text-success' };
                return { bg: 'bg-red-50', color: 'text-danger' };
            };
            const info = getAvatarInfo(t.type);
            const tAccName = accounts?.find(a => a.id === t.accountId)?.name;

            // 智慧標題邏輯：有店名顯示店名，沒有的話把「備註」拉上來當標題，再沒有才顯示分類
            const displayTitle = t.payee || t.note || (t.type === 'transfer' ? '轉帳' : (t.subcategory || t.category || '未分類'));
            
            // 判斷是否還要顯示備註 (如果備註已經被當成主標題了，副標題就不重複顯示)
            const showNoteInSubtitle = t.note && t.note !== displayTitle;
            
            // 判斷金額顯示方式 (支援中性顯示)
            const amountPrefix = t.isNeutral ? '' : (t.displayNegative ? '-' : '+');
            const amountColor = t.reconciled ? 'text-gray-300' : (t.isNeutral ? 'text-gray-500' : (t.displayNegative ? 'text-danger' : 'text-success'));

            return (
                <label onClick={onClick} className="flex justify-between p-4 border-b border-gray-50 last:border-0 items-center cursor-pointer hover:bg-gray-50 transition-colors checkbox-wrapper select-none group">
                    <div className="flex items-center gap-3 flex-1 overflow-hidden mr-2">
                        {t.onToggleReconcile && (
                            <div className="relative shrink-0 mr-1" onClick={e => e.stopPropagation()}>
                                <input type="checkbox" checked={!!t.reconciled} onChange={() => t.onToggleReconcile(t.id)} className="peer appearance-none w-5 h-5 border-2 border-gray-300 rounded-md checked:bg-primary checked:border-primary transition-colors absolute opacity-0" />
                                <div className="w-6 h-6 border-2 border-gray-300 rounded-lg flex items-center justify-center transition-colors">
                                        <Icon name="check" size="text-sm" className="text-white hidden pointer-events-none" />
                                </div>
                            </div>
                        )}
                        <div className={`size-10 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${info.bg} ${info.color}`}>
                            {t.category ? t.category.substring(0, 2) : (t.type === 'transfer' ? '轉帳' : '其他')}
                        </div>
                        <div className="flex flex-col overflow-hidden">
                            <div className={`font-bold text-sm truncate ${t.reconciled ? 'text-gray-400 line-through' : 'text-dark group-hover:text-primary transition-colors'}`}>
                                {displayTitle}
                            </div>
                            <div className="text-xs text-gray-400 flex items-center gap-1.5 truncate mt-0.5">
                                <span className="shrink-0">{t.date}</span>
                                {t.category && <span className="px-1.5 py-0.5 bg-gray-100 rounded text-[10px] text-gray-500 shrink-0">{t.category}{t.subcategory ? `·${t.subcategory}` : ''}</span>}
                                {showAccountBadge && tAccName && <span className="px-1.5 py-0.5 bg-primary/5 text-primary rounded text-[10px] shrink-0">{tAccName}</span>}
                                {showNoteInSubtitle && (
                                    <>
                                        <span className="w-1 h-1 rounded-full bg-gray-300 shrink-0"></span>
                                        <span className="truncate">{t.note}</span>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                    <span className={`font-bold shrink-0 ${amountColor}`}>
                        {amountPrefix}{formatMoney(t.amount)}
                    </span>
                </label>
            );
        };

        // --- Extracted ReconcileView ---
        const ReconcileView = ({ accounts, transactions, subViewData, setSubViewData, subViewDate, setSubViewDate, defaultClosingDay, setView, onToggleReconcile }) => {
            const creditAccounts = useMemo(() => accounts.filter(a => a.type === 'credit'), [accounts]);
            const targetAccountId = subViewData; 
            const isAllCards = targetAccountId === 'all';
            
            useEffect(() => {
                if (creditAccounts.length > 0 && targetAccountId !== 'all' && (!targetAccountId || !creditAccounts.find(a => a.id === targetAccountId))) {
                    setSubViewData(creditAccounts[0].id);
                }
            }, [creditAccounts, targetAccountId, setSubViewData]);

            if (creditAccounts.length === 0) {
                return (
                    <div className="h-full flex flex-col">
                            <div className="flex items-center gap-2 mb-4 shrink-0">
                            <button onClick={() => setView('menu')}><Icon name="arrow_back" /></button>
                            <h2 className="text-xl font-bold">對帳中心</h2>
                        </div>
                        <div className="flex-1 flex flex-col items-center justify-center text-center p-8 opacity-60">
                            <div className="bg-gray-100 p-6 rounded-full mb-4"><Icon name="credit_card_off" size="text-4xl text-gray-400" /></div>
                            <h3 className="text-lg font-bold text-dark mb-2">無信用卡帳戶</h3>
                            <p className="text-gray-500 text-sm">此功能僅供信用卡對帳使用。<br/>請先至帳戶管理新增信用卡。</p>
                        </div>
                    </div>
                );
            }

            let accStart, accEnd, accTx;
            const acc = isAllCards ? null : (creditAccounts.find(a => a.id === targetAccountId) || creditAccounts[0]);

            if (isAllCards) {
                const range = getCycleRange(subViewDate, defaultClosingDay || 31);
                accStart = range.start; accEnd = range.end;
                accTx = transactions.filter(t => {
                    const d = parseDate(t.date);
                    const account = accounts.find(a => a.id === t.accountId);
                    const toAccount = accounts.find(a => a.id === t.toAccountId);
                    const isCreditRelated = (account?.type === 'credit') || (toAccount?.type === 'credit');
                    return isCreditRelated && d >= accStart && d <= accEnd;
                }).sort((a, b) => b.date.localeCompare(a.date));
            } else {
                const range = getAccountDetailRange(subViewDate, acc, defaultClosingDay);
                accStart = range.start; accEnd = range.end;
                accTx = transactions.filter(t => {
                    const d = parseDate(t.date);
                    return (t.accountId === acc.id || t.toAccountId === acc.id) && d >= accStart && d <= accEnd;
                }).sort((a, b) => b.date.localeCompare(a.date));
            }

            const reconciledStats = accTx.reduce((accStat, t) => {
                const tAccId = t.accountId; const tToAccId = t.toAccountId;
                const accType = accounts.find(a => a.id === tAccId)?.type;
                const toAccType = accounts.find(a => a.id === tToAccId)?.type;
                
                const isRelevantExpense = isAllCards 
                    ? (t.type === 'expense' && accType === 'credit') || (t.type === 'transfer' && accType === 'credit')
                    : (t.type === 'expense' && tAccId === acc.id) || (t.type === 'transfer' && tAccId === acc.id);
                
                const isRelevantPayment = isAllCards
                    ? (t.type === 'income' && accType === 'credit') || (t.type === 'transfer' && toAccType === 'credit')
                    : (t.type === 'income' && tAccId === acc.id) || (t.type === 'transfer' && tToAccId === acc.id);

                if (t.reconciled) {
                    let amount = Number(t.amount);
                    if (isRelevantExpense) accStat.spending += amount;
                    if (isRelevantPayment) accStat.payment += amount;
                }
                return accStat;
            }, { spending: 0, payment: 0 });

            const changeMonth = (delta) => {
                const newDate = new Date(subViewDate);
                newDate.setMonth(newDate.getMonth() + delta);
                setSubViewDate(newDate);
            };

            const unpaidTotal = reconciledStats.spending - reconciledStats.payment;

            return (
                <div className="h-full flex flex-col relative">
                    <div className="flex items-center gap-2 mb-4 shrink-0">
                        <button onClick={() => setView('menu')}><Icon name="arrow_back" /></button>
                        <h2 className="text-xl font-bold">對帳中心</h2>
                    </div>

                    <div className="space-y-3 mb-4 shrink-0">
                        <div className="relative">
                            <Icon name="credit_card" className="absolute left-3 top-1/2 -translate-y-1/2 text-primary" size="text-xl" />
                            <select className="w-full p-3 pl-10 bg-white border border-gray-200 rounded-xl font-bold text-dark focus:ring-1 focus:ring-primary outline-none appearance-none" value={subViewData || ''} onChange={e => setSubViewData(e.target.value === 'all' ? 'all' : parseInt(e.target.value))}>
                                <option value="all">所有信用卡合計</option>
                                {creditAccounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                            </select>
                            <Icon name="expand_more" className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" size="text-xl" />
                        </div>

                        <DateController 
                            currentDate={subViewDate} onChangeDate={changeMonth} 
                            cycleStart={accStart} cycleEnd={accEnd} 
                            isCreditCard={true}
                            creditCardInfo={isAllCards ? "所有信用卡帳務" : (acc?.statementDate ? `結帳日: 每月 ${acc.statementDate} 號` : null)}
                        />
                    </div>

                    <div className="flex-1 overflow-y-auto bg-white rounded-xl shadow-sm border border-gray-100 pb-40">
                            {accTx.length > 0 ? accTx.map(t => {
                                const isSpending = isAllCards 
                                    ? t.type === 'expense' || (t.type === 'transfer' && accounts.find(a=>a.id===t.accountId)?.type === 'credit')
                                    : t.type === 'expense' || (t.type === 'transfer' && t.accountId === acc.id);
                                const extendedTx = { ...t, displayNegative: isSpending, onToggleReconcile };
                                return <TransactionItem key={t.id} t={extendedTx} accounts={accounts} showAccountBadge={isAllCards} />;
                            }) : <div className="p-8 text-center text-gray-400">本週期無交易紀錄</div>}
                    </div>

                    <div className="fixed bottom-[90px] left-4 right-4 bg-white/95 backdrop-blur p-3 rounded-2xl shadow-[0_5px_20px_rgba(0,0,0,0.1)] border border-gray-100 z-30 flex justify-between items-center transition-transform">
                        <div className="flex flex-col gap-0.5">
                            <div className="flex items-center gap-2 text-xs">
                                <span className="text-gray-400 w-8">消費</span>
                                <span className="font-bold text-danger">{formatMoney(reconciledStats.spending)}</span>
                            </div>
                            <div className="flex items-center gap-2 text-xs">
                                <span className="text-gray-400 w-8">繳款</span>
                                <span className="font-bold text-success">{formatMoney(reconciledStats.payment)}</span>
                            </div>
                        </div>
                        <div className="h-8 w-px bg-gray-100 mx-1"></div>
                        <div className="text-right">
                            <div className="text-[10px] text-gray-400 mb-0.5">未繳總額</div>
                            <div className={`text-xl font-black ${unpaidTotal > 0 ? 'text-dark' : 'text-success'}`}>{formatMoney(unpaidTotal)}</div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Components ---
        const Modal = ({ isOpen, onClose, title, children, maxWidth = "max-w-lg", fullMobile = false }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 modal-backdrop animate-fade-in sm:p-4 p-0">
                    <div className={`bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full ${maxWidth} ${fullMobile ? 'h-full sm:h-auto rounded-none sm:rounded-2xl' : 'max-h-[90vh]'} flex flex-col overflow-hidden relative`}>
                         <div className="px-4 py-3 border-b border-gray-100 flex justify-between items-center shrink-0 bg-white sticky top-0 z-10">
                            <h3 className="text-lg font-bold text-dark">{title}</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-2 rounded-full hover:bg-gray-100 active:bg-gray-200 transition-colors">
                                <Icon name="close" size="text-xl" />
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto overflow-x-hidden bg-gray-50/50">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const ConfirmDialog = ({ isOpen, title, message, onConfirm, onCancel, isAlert }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-backdrop">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-xs p-5 flex flex-col gap-4 animate-scale-in">
                        <div className="text-center">
                            <h3 className="text-lg font-bold text-dark mb-2">{title}</h3>
                            <p className="text-sm text-gray-500 whitespace-pre-line">{message}</p>
                        </div>
                        <div className="flex gap-3">
                            {!isAlert && (
                                <button onClick={onCancel} className="flex-1 py-2.5 rounded-xl bg-gray-100 text-gray-700 font-bold text-sm active:bg-gray-200 transition-colors">取消</button>
                            )}
                            <button onClick={onConfirm} className="flex-1 py-2.5 rounded-xl bg-primary text-white font-bold text-sm shadow-lg shadow-primary/30 active:scale-95 transition-transform">
                                {isAlert ? '知道了' : '確定'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- App ---
        const App = () => {
            // 清空預設測試資料以防止程式碼遭截斷。使用者可直接匯入其完整備份資料。
            const INITIAL_DATA = {
                accounts: [],
                transactions: [],
                categories: [
                    // ===== 根據使用者指南重建的食衣住行育樂分類 =====
                    {"id":"exp_food","name":"飲食","type":"expense","subcategories":["早餐","午餐","晚餐","飲料零食"]},
                    {"id":"exp_daily","name":"生活用品","type":"expense","subcategories":["日常必需品","個人護理"]},
                    {"id":"exp_transport","name":"交通","type":"expense","subcategories":["通勤","偶爾搭車","油錢","停車費"]},
                    {"id":"exp_housing","name":"居住","type":"expense","subcategories":["房租","水電瓦斯","家具","管理費"]},
                    {"id":"exp_clothing","name":"服飾","type":"expense","subcategories":["服裝","鞋子","配件"]},
                    {"id":"exp_edu_ent","name":"育樂","type":"expense","subcategories":["書籍","課程","娛樂","旅遊","運動"]},
                    {"id":"exp_other","name":"其他","type":"expense","subcategories":["醫療","保險","稅捐","雜項"]},
                    
                    // ===== 收入分類 =====
                    {"id":"inc_fixed","name":"固定收入","type":"income","subcategories":["薪資","獎金"]},
                    {"id":"inc_var","name":"變動收入","type":"income","subcategories":["投資獲利","接案","其他"]}
                ],
                budgets: [],
                recurring: []
            };

            const [view, setView] = useState('dashboard');
            const [subViewData, setSubViewData] = useState(null);
            
            const [dialog, setDialog] = useState({ isOpen: false, title: '', message: '', onConfirm: null, isAlert: false });

            // State Initialization with local storage fallback
            const [accounts, setAccounts] = useState(() => JSON.parse(localStorage.getItem('accounts')) || INITIAL_DATA.accounts);
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('transactions')) || INITIAL_DATA.transactions);
            const [recurring, setRecurring] = useState(() => JSON.parse(localStorage.getItem('recurring')) || INITIAL_DATA.recurring);
            const [categories, setCategories] = useState(() => {
                const saved = JSON.parse(localStorage.getItem('categories'));
                
                // 如果沒有儲存記錄，使用新的預設分類
                if (!saved || saved.length === 0) {
                    return INITIAL_DATA.categories;
                }

                // 自動修復與去重機制 (防範舊資料有重複項目與相同 ID)
                const uniqueMap = new Map();
                saved.forEach(cat => {
                    const key = `${cat.type}_${cat.name}`; // 以 類型+名稱 當作唯一標識
                    if (!uniqueMap.has(key)) {
                        uniqueMap.set(key, { ...cat, id: cat.id || generateId() }); // 確保有獨立 ID
                    } else {
                        // 如果有重複，保留子分類數量較多的一個，並確保 ID 不會重複打架
                        const existing = uniqueMap.get(key);
                        if ((cat.subcategories?.length || 0) > (existing.subcategories?.length || 0)) {
                            uniqueMap.set(key, { ...cat, id: existing.id }); // 繼承原本的 ID 以防破壞關聯
                        }
                    }
                });
                
                return Array.from(uniqueMap.values());
            });
            const [budgets, setBudgets] = useState(() => {
                const saved = JSON.parse(localStorage.getItem('budgets'));
                if (saved && saved.length > 0) {
                    return saved.map(b => ({
                        ...b,
                        targetCategories: b.targetCategories || [] 
                    }));
                }
                return INITIAL_DATA.budgets;
            });
            const [settings, setSettings] = useState(() => JSON.parse(localStorage.getItem('settings')) || { cycleStartDay: 31, syncUrl: '', accountGroupOrder: ['general', 'credit'] });

            const getInitialDateForCycle = (closingDayParam) => {
                const now = new Date();
                const closingDay = parseInt(closingDayParam) || 31;
                
                if (now.getDate() > closingDay) {
                    return new Date(now.getFullYear(), now.getMonth() + 1, 1);
                }
                return now;
            };

            const [viewDate, setViewDate] = useState(() => getInitialDateForCycle(settings.cycleStartDay)); 
            const [subViewDate, setSubViewDate] = useState(new Date());

            useEffect(() => localStorage.setItem('accounts', JSON.stringify(accounts)), [accounts]);
            useEffect(() => localStorage.setItem('transactions', JSON.stringify(transactions)), [transactions]);
            useEffect(() => localStorage.setItem('budgets', JSON.stringify(budgets)), [budgets]);
            useEffect(() => localStorage.setItem('recurring', JSON.stringify(recurring)), [recurring]);
            useEffect(() => localStorage.setItem('categories', JSON.stringify(categories)), [categories]);
            useEffect(() => localStorage.setItem('settings', JSON.stringify(settings)), [settings]);

            const closeDialog = () => setDialog(prev => ({ ...prev, isOpen: false }));
            
            const showConfirm = (title, message, onConfirmCallback) => {
                setDialog({ isOpen: true, title, message, onConfirm: () => { onConfirmCallback(); closeDialog(); }, isAlert: false });
            };

            const showAlert = (title, message) => {
                setDialog({ isOpen: true, title, message, onConfirm: closeDialog, isAlert: true });
            };

            const calculateAccountBalance = (account) => {
                const now = new Date();
                const todayStr = formatDate(now);
                
                let balance = Number(account.balance) || 0;
                
                transactions.forEach(t => {
                    if (t.date > todayStr) return;
                    const amt = Number(t.amount);
                    if (t.accountId === account.id) {
                        if (t.type === 'expense') balance -= amt;
                        else if (t.type === 'income') balance += amt; 
                        else if (t.type === 'transfer') balance -= amt;
                    }
                    if (t.toAccountId === account.id && t.type === 'transfer') {
                        balance += amt;
                    }
                });
                return balance;
            };

            useEffect(() => {
                const checkRecurring = () => {
                    const now = new Date();
                    const limitDate = new Date(now.getFullYear() + 3, now.getMonth(), 1); 
                    
                    let newTx = [];
                    let hasUpdates = false;

                    const updatedRecurring = recurring.map(rule => {
                        const isActive = rule.isActive !== undefined ? rule.isActive : rule.active;
                        if (!isActive) return rule; 

                        let currentRule = { ...rule };
                        let lastRun = currentRule.lastRunDate ? new Date(currentRule.lastRunDate) : null;
                        
                        let iterations = 0;
                        while(iterations < 48) { 
                            iterations++;
                            let nextDate;
                            if (lastRun) {
                                let y = lastRun.getFullYear();
                                let m = lastRun.getMonth() + 1;
                                const daysInMonth = new Date(y, m + 1, 0).getDate();
                                const targetDay = Math.min(rule.day, daysInMonth);
                                nextDate = new Date(y, m, targetDay);
                            } else {
                                const start = new Date(currentRule.startDate);
                                let y = start.getFullYear();
                                let m = start.getMonth();
                                if (start.getDate() > rule.day) m++;
                                const daysInMonth = new Date(y, m + 1, 0).getDate();
                                const targetDay = Math.min(rule.day, daysInMonth);
                                nextDate = new Date(y, m, targetDay);
                            }

                            if (nextDate > limitDate) break;
                            if (nextDate < new Date(currentRule.startDate)) {
                                lastRun = nextDate; 
                                continue; 
                            }
                            
                            const dateStr = formatDate(nextDate);
                            const exists = transactions.some(t => t.recurringRuleId === currentRule.id && t.date === dateStr);
                            
                            if (!exists) {
                                newTx.push({
                                    id: generateId(),
                                    date: dateStr,
                                    amount: Number(currentRule.amount),
                                    type: currentRule.type,
                                    accountId: currentRule.accountId,
                                    category: currentRule.category,
                                    subcategory: currentRule.subcategory,
                                    payee: currentRule.payee || '',
                                    recurringRuleId: currentRule.id, 
                                    budgetId: currentRule.budgetId,
                                    note: (currentRule.note || currentRule.name) + ' (定期)',
                                    isRecurring: true,
                                    reconciled: false
                                });
                            }
                            lastRun = nextDate;
                            currentRule.lastRunDate = dateStr;
                            hasUpdates = true;
                        }
                        return currentRule;
                    });

                    if (newTx.length > 0 || hasUpdates) {
                        setTransactions(prev => [...newTx, ...prev]);
                        setRecurring(updatedRecurring);
                    }
                };
                checkRecurring();
            }, [recurring.length, recurring.map(r => r.active).join(','), recurring.map(r => r.lastRunDate).join(',')]); 

            const handleSaveTransaction = (tx) => {
                const installmentCount = parseInt(tx.installmentCount);
                if (!tx.id && tx.type === 'expense' && installmentCount > 1) {
                    const totalAmount = Number(tx.amount);
                    const baseAmount = Math.floor(totalAmount / installmentCount);
                    const remainder = totalAmount % installmentCount;
                    const newTxList = [];
                    const [y, m, d] = tx.date.split('-').map(Number);

                    for (let i = 0; i < installmentCount; i++) {
                        const amount = (i === 0) ? baseAmount + remainder : baseAmount;
                        // Precision handling for end of month dates
                        const targetDate = new Date(y, m - 1 + i, d);
                        if (targetDate.getMonth() !== (m - 1 + i) % 12) targetDate.setDate(0); 
                        const dateStr = formatDate(targetDate);

                        newTxList.push({
                            id: generateId(),
                            date: dateStr,
                            type: tx.type,
                            amount: amount,
                            accountId: tx.accountId,
                            toAccountId: tx.toAccountId,
                            category: tx.category,
                            subcategory: tx.subcategory,
                            payee: tx.payee || '',
                            budgetId: tx.budgetId,
                            note: `${tx.note || ''} (分期 ${i + 1}/${installmentCount})`,
                            isInstallmentItem: true,
                            reconciled: false
                        });
                    }
                    setTransactions(prev => [...newTxList, ...prev]);
                } else {
                    const txData = { ...tx, amount: Number(tx.amount), isInstallmentItem: tx.isInstallmentItem || tx.isInstallment, reconciled: tx.reconciled || false };
                    const shouldCreateRule = txData.setRecurring;
                    delete txData.installmentCount; 
                    delete txData.setRecurring;

                    if (shouldCreateRule && !tx.id) {
                         const newRuleId = generateId();
                         setRecurring(prev => [...prev, {
                            id: newRuleId,
                            name: (txData.payee || txData.subcategory || txData.category) + ' (定期)',
                            day: new Date(txData.date).getDate(),
                            amount: txData.amount,
                            type: txData.type,
                            accountId: txData.accountId,
                            category: txData.category,
                            subcategory: txData.subcategory,
                            payee: txData.payee || '',
                            budgetId: txData.budgetId,
                            note: txData.note,
                            isActive: true,
                            startDate: txData.date,
                            frequency: '每月'
                        }]);
                        txData.recurringRuleId = newRuleId;
                        showAlert('成功', '已新增至定期扣款管理');
                    }

                    if (txData.id) setTransactions(prev => prev.map(t => t.id === txData.id ? txData : t));
                    else { txData.id = generateId(); setTransactions(prev => [txData, ...prev]); }
                }
            };

            const handleDeleteTransaction = (id) => {
                showConfirm('刪除交易', '確定刪除此交易？', () => {
                    setTransactions(prev => prev.filter(t => t.id !== id));
                });
            };

            const handleToggleReconcile = (id) => {
                setTransactions(prev => prev.map(t => t.id === id ? { ...t, reconciled: !t.reconciled } : t));
            };

            const handleSaveAccount = (acc) => {
                const accData = {
                    ...acc,
                    balance: Number(acc.balance),
                    creditLimit: acc.creditLimit ? Number(acc.creditLimit) : "",
                    statementDate: acc.statementDate ? Number(acc.statementDate) : "",
                    dueDate: acc.dueDate ? Number(acc.dueDate) : "",
                    cycleStartDay: acc.cycleStartDay ? Number(acc.cycleStartDay) : 31,
                    startDate: acc.startDate || formatDate(new Date()) 
                };
                if (accData.id) setAccounts(prev => prev.map(a => a.id === accData.id ? accData : a));
                else { accData.id = generateId(); setAccounts(prev => [...prev, accData]); }
            };

            const handleDeleteAccount = (id) => {
                showConfirm('刪除帳戶', `將刪除相關交易，確定嗎？`, () => {
                    setAccounts(prev => prev.filter(a => a.id !== id));
                    setTransactions(prev => prev.filter(t => t.accountId !== id && t.toAccountId !== id));
                });
            };

            const moveAccount = (id, direction) => {
                const index = accounts.findIndex(a => a.id === id);
                if (index < 0) return;
                const newAccounts = [...accounts];
                if (direction === 'up' && index > 0) {
                    [newAccounts[index - 1], newAccounts[index]] = [newAccounts[index], newAccounts[index - 1]];
                } else if (direction === 'down' && index < newAccounts.length - 1) {
                    [newAccounts[index + 1], newAccounts[index]] = [newAccounts[index], newAccounts[index + 1]];
                }
                setAccounts(newAccounts);
            };

            // 處理信用卡自動帶入未繳金額與日期的邏輯
            const handlePayCreditCard = (e, acc) => {
                e.stopPropagation();
                const now = new Date();
                let m = now.getMonth();
                let y = now.getFullYear();
                const sDay = parseInt(acc.statementDate) || 1;

                // 決定上一個結帳日
                let lastStatementDate;
                if (now.getDate() < sDay) { 
                    lastStatementDate = new Date(y, m - 1, sDay);
                } else {
                    lastStatementDate = new Date(y, m, sDay);
                }
                const lastStatementDateStr = formatDate(lastStatementDate);

                // 計算截至該結帳日的未繳餘額 (應繳總額)
                let unpaidAmt = 0;
                transactions.forEach(t => {
                    if (t.date <= lastStatementDateStr) {
                        if (t.accountId === acc.id) {
                            if (t.type === 'expense' || t.type === 'transfer') unpaidAmt += Number(t.amount);
                            else if (t.type === 'income') unpaidAmt -= Number(t.amount);
                        }
                        if (t.toAccountId === acc.id && t.type === 'transfer') {
                            unpaidAmt -= Number(t.amount);
                        }
                    }
                });

                unpaidAmt = Math.max(0, unpaidAmt);

                setEditingTx({
                    type: 'transfer',
                    toAccountId: acc.id,
                    date: lastStatementDateStr, // 預設日期為上個結帳日
                    amount: unpaidAmt > 0 ? String(unpaidAmt) : '', // 帶入應繳金額
                    accountId: accounts.find(a => a.type !== 'credit')?.id || '',
                    note: '信用卡帳單繳款'
                });
                setTxModalOpen(true);
            };

            const TransactionFormModal = ({ initialData, isOpen, onClose, onSave, onDelete }) => {
                const [form, setForm] = useState({ setRecurring: false, budgetId: '', payee: '', ...initialData });
                const [calcDisplay, setCalcDisplay] = useState('0');
                const [isCalcActive, setIsCalcActive] = useState(false);

                // Derived state for subcategories
                const currentCategoryObj = categories.find(c => c.name === form.category && c.type === form.type);
                const subcategoriesOptions = currentCategoryObj?.subcategories || [];

                useEffect(() => {
                    if (initialData) {
                        setForm({ setRecurring: false, budgetId: '', payee: '', ...initialData });
                        setCalcDisplay(String(initialData.amount || ''));
                        if (!initialData.id) setIsCalcActive(false); 
                    }
                }, [initialData]);

                const handleChange = (f, v) => {
                    setForm(p => {
                        const newData = { ...p, [f]: v };
                        // Transfer guard
                        if (f === 'type' && v === 'transfer') {
                            if (!newData.toAccountId || newData.toAccountId === newData.accountId) {
                                const otherAcc = accounts.find(a => String(a.id) !== String(newData.accountId));
                                if (otherAcc) newData.toAccountId = otherAcc.id;
                            }
                        }
                        // Category change guard
                        if (f === 'type') {
                            const newCat = categories.find(c => c.type === v);
                            newData.category = newCat ? newCat.name : '';
                            newData.subcategory = newCat && newCat.subcategories?.length > 0 ? newCat.subcategories[0] : '';
                            
                            // Auto-bind budget logic when type changes
                            const matchingBudg = budgets.find(b => b.targetCategories?.includes(newData.category));
                            newData.budgetId = matchingBudg ? matchingBudg.id : '';
                        }
                        if (f === 'category') {
                            const catObj = categories.find(c => c.name === v && c.type === newData.type);
                            newData.subcategory = catObj && catObj.subcategories?.length > 0 ? catObj.subcategories[0] : '';
                            
                            // Auto-bind budget logic when category changes
                            const matchingBudg = budgets.find(b => b.targetCategories?.includes(v));
                            newData.budgetId = matchingBudg ? matchingBudg.id : '';
                        }
                        return newData;
                    });
                };
                
                const calculateResult = (expression) => {
                    try {
                        if (/[^0-9+\-*/.\s]/.test(expression)) return expression;
                        // eslint-disable-next-line no-new-func
                        const result = Function('"use strict";return (' + expression + ')')();
                        return String(result);
                    } catch (e) { return 'Error'; }
                };

                const handleCalcPress = (key) => {
                    if (key === 'C') { setCalcDisplay('0'); }
                    else if (key === '=') { setCalcDisplay(calculateResult(calcDisplay)); } 
                    else if (key === 'OK') {
                        let finalVal = calcDisplay;
                        if (/[+\-*/]/.test(calcDisplay)) finalVal = calculateResult(calcDisplay);
                        if (finalVal === 'Error' || finalVal === 'Infinity' || finalVal === 'NaN') {
                            alert('計算錯誤或數字無效'); setCalcDisplay('0');
                        } else {
                            handleChange('amount', finalVal); setIsCalcActive(false);
                        }
                    } else if (key === 'backspace') {
                        setCalcDisplay(prev => prev.length > 1 ? prev.slice(0, -1) : '0');
                    } else {
                        setCalcDisplay(prev => prev === '0' && !['/','*','-','+','.'].includes(key) ? String(key) : prev + key);
                    }
                };

                const calcButtons = ['C', '/', '*', 'backspace', '7', '8', '9', '-', '4', '5', '6', '+', '1', '2', '3', '=', '0', '.', 'OK'];

                return (
                    <Modal isOpen={isOpen} onClose={onClose} maxWidth="max-w-sm" title={form.id ? '編輯交易' : '新增交易'}>
                        <div className="flex flex-col h-full pb-safe">
                            <div className="flex-1 p-4 space-y-4">
                                <div className="flex p-1 bg-gray-200 rounded-lg">
                                    {['expense', 'income', 'transfer'].map(t => {
                                        if (t === 'transfer' && accounts.length < 2) return null;
                                        return (
                                            <label key={t} className="flex-1 cursor-pointer">
                                                <input type="radio" name="tx_type" className="hidden peer" checked={form.type === t} onChange={() => handleChange('type', t)} />
                                                <div className="text-center py-2 text-sm font-medium rounded-md peer-checked:bg-white peer-checked:text-primary peer-checked:shadow-sm text-gray-500 transition-all">
                                                    {t === 'expense' ? '支出' : t === 'income' ? '收入' : '轉帳'}
                                                </div>
                                            </label>
                                        );
                                    })}
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">金額</label>
                                    <div className="relative" onClick={() => setIsCalcActive(true)}>
                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-xl font-bold text-gray-400">$</span>
                                        <input type="text" readOnly className="w-full pl-10 pr-4 py-3 bg-white border border-gray-200 rounded-lg text-3xl font-bold text-primary focus:ring-2 focus:ring-primary outline-none transition-all cursor-pointer" placeholder="0" value={form.amount} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">日期</label>
                                        <input type="date" className="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-1 focus:ring-primary outline-none" value={form.date} onChange={e => handleChange('date', e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">{form.type === 'transfer' ? '轉出' : '帳戶'}</label>
                                        <select className="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-1 focus:ring-primary outline-none" value={form.accountId || ''} onChange={e => { const acc = accounts.find(a => String(a.id) === e.target.value); handleChange('accountId', acc ? acc.id : e.target.value); }}>
                                            {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                        </select>
                                    </div>
                                </div>
                                
                                {form.type !== 'transfer' && (
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">交易對象 / 店名 (選填)</label>
                                        <input type="text" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-1 focus:ring-primary outline-none" placeholder="例如：麥當勞、中華電信..." value={form.payee || ''} onChange={e => handleChange('payee', e.target.value)} />
                                    </div>
                                )}

                                {form.type === 'transfer' ? (
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">轉入帳戶</label>
                                        <select className="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-1 focus:ring-primary outline-none" value={form.toAccountId || ''} onChange={e => { const acc = accounts.find(a => String(a.id) === e.target.value); handleChange('toAccountId', acc ? acc.id : e.target.value); }}>
                                            {accounts.filter(a => String(a.id) !== String(form.accountId)).map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                        </select>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 gap-3 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 mb-1">主分類</label>
                                            <select className="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-1 focus:ring-primary outline-none" value={form.category || ''} onChange={e => handleChange('category', e.target.value)}>
                                                {categories.filter(c => c.type === form.type).map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 mb-1">子分類</label>
                                            <select className="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-1 focus:ring-primary outline-none" value={form.subcategory || ''} onChange={e => handleChange('subcategory', e.target.value)}>
                                                {subcategoriesOptions.map((sub, i) => <option key={i} value={sub}>{sub}</option>)}
                                                <option value="">(無)</option>
                                            </select>
                                        </div>
                                    </div>
                                )}
                                
                                {/* 允許手動修改預算綁定 */}
                                {form.type === 'expense' && (
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">計入預算 (可手動排除)</label>
                                        <select className="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-1 focus:ring-primary outline-none" value={form.budgetId || ''} onChange={e => handleChange('budgetId', e.target.value)}>
                                            <option value="">不列入預算</option>
                                            {budgets.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                                        </select>
                                    </div>
                                )}

                                {form.type === 'expense' && accounts.find(a => String(a.id) === String(form.accountId))?.type === 'credit' && !form.id && (
                                    <div className="bg-gray-50 p-2 rounded-lg border border-gray-100">
                                        <label className="block text-xs font-bold text-gray-500 mb-1">信用卡分期 (選填)</label>
                                        <input type="number" className="w-full p-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-1 focus:ring-primary outline-none" placeholder="留空即為一次付清 (例如: 3)" value={form.installmentCount || ''} onChange={e => handleChange('installmentCount', e.target.value)} />
                                        <p className="text-[10px] text-gray-400 mt-1">若填寫，系統將自動按月拆分交易，餘額計入首期。</p>
                                    </div>
                                )}
                                {form.isInstallmentItem && <div className="bg-blue-50 text-primary p-2 rounded text-xs font-medium">✨ 此為分期付款項目</div>}
                                
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">備註細節</label>
                                    <textarea className="w-full px-4 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:ring-1 focus:ring-primary outline-none resize-none" rows="2" placeholder="輸入其他說明..." value={form.note} onChange={e => handleChange('note', e.target.value)}></textarea>
                                </div>
                                {!form.id && (
                                    <div className="flex items-center gap-2">
                                        <input type="checkbox" id="recurring" checked={form.setRecurring} onChange={e => handleChange('setRecurring', e.target.checked)} className="rounded text-primary focus:ring-primary size-5"/>
                                        <label htmlFor="recurring" className="text-sm font-medium text-gray-600">設為定期自動記帳</label>
                                    </div>
                                )}
                                <div className="pt-2 mt-2">
                                    <button onClick={() => { onSave(form); onClose(); }} className="w-full py-3 bg-primary text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform">
                                        {form.id ? '儲存變更' : '儲存交易'}

                    if (!editRule.active) {
                        setTransactions(prev => prev.filter(t => {
                            const isLinked = t.recurringRuleId === editRule.id;
                            const isStrictlyFuture = t.date > todayStr; 
                            if (isLinked && isStrictlyFuture && !t.reconciled) return false;
                            return true;
                        }));
                        setRecurring(prev => prev.map(r => r.id === editRule.id ? { ...editRule, amount: Number(editRule.amount), isActive: false, lastRunDate: todayStr } : r));

                        setTransactions(prev => prev.map(t => {
                             const isLinked = t.recurringRuleId === editRule.id;
                             const isFutureOrToday = t.date >= todayStr;
