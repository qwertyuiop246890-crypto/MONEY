                    const catName = tempCat.name.trim();
                    if(!catName) return;
                    
                    // 防呆：檢查是否已經有同名分類 (排除自己)
                    const isDuplicate = categories.some(c => c.type === tab && c.name === catName && c.id !== tempCat.id);
                    if (isDuplicate) {
                        showAlert('名稱重複', '已經有相同名稱的主分類，請使用其他名稱！');
                        return;
                    }

                    const subs = tempCat.subcategoriesStr.split(',').map(s => s.trim()).filter(Boolean);
                    
                    if(tempCat.id) {
                        setCategories(prev => prev.map(c => c.id === tempCat.id ? { ...c, name: catName, subcategories: subs } : c));
                    } else {
                        setCategories(prev => [...prev, { id: generateId(), name: catName, type: tab, subcategories: subs }]);
                    }
                    setModal(false);
                };

                const del = (id) => {
                    showConfirm('刪除主分類', '這可能影響現有紀錄，確定刪除嗎？', () => {
                        setCategories(prev => prev.filter(c => c.id !== id));
                    });
                };

                const moveCategory = (id, direction) => {
                    const visibleCats = categories.filter(c => c.type === tab);
                    const currentIndex = visibleCats.findIndex(c => c.id === id);
                    if (currentIndex === -1) return;

                    let targetIndex = -1;
                    if (direction === 'up' && currentIndex > 0) targetIndex = currentIndex - 1;
                    if (direction === 'down' && currentIndex < visibleCats.length - 1) targetIndex = currentIndex + 1;

                    if (targetIndex === -1) return;

                    const itemA = visibleCats[currentIndex];
                    const itemB = visibleCats[targetIndex];

                    const indexA = categories.findIndex(c => c.id === itemA.id);
                    const indexB = categories.findIndex(c => c.id === itemB.id);

                    const newCats = [...categories];
                    [newCats[indexA], newCats[indexB]] = [newCats[indexB], newCats[indexA]];
                    setCategories(newCats);
                };

                return (
                    <div className="space-y-4 flex flex-col h-full">
                        <div className="flex items-center justify-between mb-4 shrink-0">
                            <div className="flex items-center gap-2">
                                <button onClick={() => setView('menu')} className="p-1 -ml-1"><Icon name="arrow_back" /></button>
                                <h2 className="text-xl font-bold">分類管理中心</h2>
                            </div>
                            <button onClick={() => { setTempCat({ name: '', subcategoriesStr: '' }); setModal(true); }} className="text-primary"><Icon name="add_circle" size="text-3xl" /></button>
                        </div>
                        <div className="flex bg-gray-200 rounded-xl p-1 shrink-0">
                            {['expense', 'income'].map(t => (
                                <button key={t} onClick={() => setTab(t)} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${tab === t ? 'bg-white text-primary shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
                                    {t === 'expense' ? '支出' : '收入'}
                                </button>
                            ))}
                        </div>
                        <div className="flex-1 overflow-y-auto space-y-3 pb-20">
                            {currentCats.map(c => (
                                <div key={c.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col gap-3 group">
                                    <div className="flex justify-between items-center">
                                        <span className="font-extrabold text-dark text-lg flex items-center gap-2"><Icon name="label" size="text-xl" className="text-primary"/>{c.name}</span>
                                        <div className="flex items-center gap-2">
                                            <div className="flex flex-col gap-0.5 mr-2">
                                                <button onClick={() => moveCategory(c.id, 'up')} className="text-gray-300 hover:text-primary leading-none"><Icon name="arrow_drop_up" size="text-xl"/></button>
                                                <button onClick={() => moveCategory(c.id, 'down')} className="text-gray-300 hover:text-primary leading-none"><Icon name="arrow_drop_down" size="text-xl"/></button>
                                            </div>
                                            <div className="flex gap-1">
                                                <button onClick={() => { setTempCat({...c, subcategoriesStr: (c.subcategories || []).join(', ') }); setModal(true); }} className="p-1 text-gray-400 hover:text-primary"><Icon name="edit" size="text-xl"/></button>
                                                <button onClick={() => del(c.id)} className="p-1 text-gray-400 hover:text-danger"><Icon name="delete" size="text-xl"/></button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-1.5">
                                        {(c.subcategories && c.subcategories.length > 0) ? c.subcategories.map((sub, i) => (
                                            <span key={i} className="px-2 py-1 bg-gray-50 border border-gray-100 text-gray-600 rounded-md text-xs font-medium">{sub}</span>
                                        )) : <span className="text-xs text-gray-400 italic">無子分類</span>}
                                    </div>
                                </div>
                            ))}
                        </div>
                         <Modal isOpen={modal} onClose={() => setModal(false)} title={tempCat.id ? "編輯主/子分類" : "新增主/子分類"}>
                            <div className="p-6 space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">主分類名稱 <span className="text-danger">*</span></label>
                                    <input className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-1 focus:ring-primary outline-none" placeholder="例如：生活費" value={tempCat.name} onChange={e => setTempCat({...tempCat, name: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">子分類 (選填)</label>
                                    <textarea className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-1 focus:ring-primary outline-none resize-none text-sm" rows="3" placeholder="請用逗號分隔，例如：伙食, 日用品, 水電瓦斯" value={tempCat.subcategoriesStr} onChange={e => setTempCat({...tempCat, subcategoriesStr: e.target.value})}></textarea>
                                </div>
                                <button onClick={save} className="w-full py-3 bg-primary text-white font-bold rounded-lg shadow-lg active:scale-95 transition-transform mt-2">儲存分類</button>
                            </div>
                        </Modal>
                    </div>
                );
            };

            const MenuView = () => {
                const [isSyncing, setIsSyncing] = useState(false);
                const sync = async (action) => {
                    if (!settings.syncUrl) return showAlert('錯誤', '請先設定 URL');
                    setIsSyncing(true);
                    try {
                        if (action === 'upload') {
                            const response = await fetch(settings.syncUrl, { method: 'POST', headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ action: 'upload', data: { accounts, transactions, budgets, recurring, categories, settings } }) });
                            const resText = await response.text();
                            let resData; try { resData = JSON.parse(resText); } catch(e) { resData = { status: 'error', message: resText }; }
                            if (resData.status === 'success') showAlert('成功', '資料已備份至 Google Drive'); else throw new Error(resData.message || '上傳失敗');
                        } else {
                            showConfirm('還原資料', '這將覆蓋本地所有資料，確定嗎？', async () => {
                                try {
                                    const response = await fetch(`${settings.syncUrl}?action=download`);
                                    if (!response.ok) { const errText = await response.text().catch(() => '網路回應不正常'); throw new Error(`伺服器錯誤: ${response.status}\n${errText.slice(0, 50)}...`); }
                                    const resText = await response.text();
                                    let resData; try { resData = JSON.parse(resText); } catch (e) { throw new Error('無法解析伺服器回應。'); }
                                    if (resData.status === 'success' && resData.data) {
                                        const { data } = resData; setAccounts(data.accounts || []); setTransactions(data.transactions || []); setBudgets(data.budgets || []); setRecurring(data.recurring || []); setCategories(data.categories || []); setSettings(prev => ({ ...data.settings, syncUrl: prev.syncUrl }));
                                        showAlert('成功', '資料已從 Google Drive 還原');
                                    } else throw new Error(resData.message || '無資料或格式錯誤');
                                } catch(e) { showAlert('還原失敗', e.message); } finally { setIsSyncing(false); }
                            });
                            return; 
                        }
                    } catch(e) { showAlert('同步失敗', e.message); } finally { if (action === 'upload') setIsSyncing(false); }
                };

                return (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold px-1">更多功能</h2>
                        <div className="bg-white rounded-xl border border-gray-100 overflow-hidden shadow-sm">
                            <button onClick={() => { setSubViewDate(new Date()); setView('budgets'); }} className="w-full flex items-center justify-between p-4 bg-white border-b border-gray-100 last:border-0 active:bg-gray-50 hover:bg-gray-50 transition-colors"><div className="flex items-center gap-3"><Icon name="pie_chart" className="text-primary bg-primary/10 p-1.5 rounded-lg"/><span className="font-bold text-dark">智慧預算管理</span></div><Icon name="chevron_right" className="text-gray-300" size="text-xl"/></button>
                            <button onClick={() => { setSubViewDate(new Date()); setView('recurring'); }} className="w-full flex items-center justify-between p-4 bg-white border-b border-gray-100 last:border-0 active:bg-gray-50 hover:bg-gray-50 transition-colors"><div className="flex items-center gap-3"><Icon name="event_repeat" className="text-green-500 bg-green-50 p-1.5 rounded-lg"/><span className="font-bold text-dark">定期定額中心</span></div><Icon name="chevron_right" className="text-gray-300" size="text-xl"/></button>
                            <button onClick={() => { 
                                const firstCredit = accounts.find(a => a.type === 'credit');
                                const date = firstCredit ? getInitialDateForCycle(firstCredit.statementDate) : new Date();
                                setSubViewDate(date); 
                                if (firstCredit) setSubViewData(firstCredit.id);
                                setView('reconcile'); 
                            }} className="w-full flex items-center justify-between p-4 bg-white border-b border-gray-100 last:border-0 active:bg-gray-50 hover:bg-gray-50 transition-colors"><div className="flex items-center gap-3"><Icon name="fact_check" className="text-orange-500 bg-orange-50 p-1.5 rounded-lg"/><span className="font-bold text-dark">信用卡對帳</span></div><Icon name="chevron_right" className="text-gray-300" size="text-xl"/></button>
                            <button onClick={() => setView('categories')} className="w-full flex items-center justify-between p-4 bg-white border-b border-gray-100 last:border-0 active:bg-gray-50 hover:bg-gray-50 transition-colors"><div className="flex items-center gap-3"><Icon name="category" className="text-blue-500 bg-blue-50 p-1.5 rounded-lg"/><span className="font-bold text-dark">主/子分類管理</span></div><Icon name="chevron_right" className="text-gray-300" size="text-xl"/></button>
                        </div>
                        <div className="bg-white rounded-xl border border-gray-100 overflow-hidden shadow-sm p-5">
                            <h3 className="font-bold mb-4 flex items-center gap-2"><Icon name="cloud_sync" className="text-primary"/> 資料備份 (Google Drive)</h3>
                            <input className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg mb-4 text-sm focus:ring-1 focus:ring-primary outline-none" placeholder="輸入 Google Apps Script URL" value={settings.syncUrl} onChange={e => setSettings({...settings, syncUrl: e.target.value})} />
                            <div className="flex gap-3">
                                <button onClick={() => sync('upload')} disabled={isSyncing} className={`flex-1 py-3 rounded-xl font-bold text-sm text-white transition-all ${isSyncing ? 'bg-gray-400 cursor-not-allowed' : 'bg-primary shadow-lg shadow-primary/30 active:scale-95 hover:bg-primary-hover'}`}>{isSyncing ? '處理中...' : '備份上傳'}</button>
                                <button onClick={() => sync('download')} disabled={isSyncing} className={`flex-1 py-3 rounded-xl font-bold text-sm text-dark bg-gray-100 transition-all ${isSyncing ? 'opacity-50 cursor-not-allowed' : 'active:bg-gray-200 hover:bg-gray-200'}`}>還原下載</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const BudgetsView = () => {
                 const [editBudget, setEditBudget] = useState(null);
                 const [modalOpen, setModalOpen] = useState(false);
                 return (
                     <div className="space-y-4">
                        <div className="flex justify-between items-center mb-4">
                             <div className="flex items-center gap-2">
                                <button onClick={() => setView('dashboard')} className="p-1 -ml-1"><Icon name="arrow_back" /></button>
                                <h2 className="text-2xl font-bold">智慧預算管理</h2>
                            </div>
                            <button onClick={() => { setEditBudget({ resetDay: 31, targetCategories: [] }); setModalOpen(true); }} className="text-primary"><Icon name="add_circle" size="text-3xl" /></button>
                        </div>
                        <p className="text-sm text-gray-500 mb-4 px-1">設定預算並綁定特定主分類，記帳時系統將為您自動計算追蹤。</p>
                        <div className="space-y-3">
                            {budgets.map(b => (
                                <div key={b.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col gap-2">
                                    <div className="flex justify-between items-start">
                                        <div className="flex flex-col">
                                            <h4 className="font-bold text-lg flex items-center gap-2">{b.name}</h4>
                                            <div className="flex flex-wrap items-center gap-2 mt-1">
                                                <span className="text-[10px] px-2 py-0.5 rounded font-bold bg-primary/10 text-primary flex shrink-0">
                                                    {(b.targetCategories && b.targetCategories.length > 0) ? `綁定 ${b.targetCategories.length} 個分類` : '無綁定分類'}
                                                </span>
                                                <span className="text-xs text-gray-400">每月 {b.resetDay || 31} 號結算</span>
                                            </div>
                                        </div>
                                        <div className="flex gap-1 shrink-0">
                                            <button onClick={() => { setEditBudget(b); setModalOpen(true); }} className="p-1 text-gray-400 hover:text-primary"><Icon name="edit"/></button>
                                            <button onClick={() => showConfirm('刪除預算', '確定刪除此預算？', () => setBudgets(p => p.filter(x => x.id !== b.id)))} className="p-1 text-gray-400 hover:text-danger"><Icon name="delete"/></button>
                                        </div>
                                    </div>
                                    <div className="mt-2 text-xl font-black text-dark">{formatMoney(b.limit)}</div>
                                </div>
                            ))}
                        </div>
                        {budgets.length === 0 && <div className="text-center py-10 text-gray-400">尚無預算設定，點擊右上角新增</div>}
                        
                        <Modal isOpen={modalOpen} onClose={() => setModalOpen(false)} title={editBudget?.id ? "編輯預算" : "新增預算"}>
                            <div className="p-6 space-y-4">
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">預算名稱</label><input className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-1 focus:ring-primary outline-none" placeholder="例如：生活費總管" value={editBudget?.name || ''} onChange={e => setEditBudget({...editBudget, name: e.target.value})} /></div>
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">每月預算金額</label><input className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-1 focus:ring-primary outline-none" type="number" placeholder="0" value={editBudget?.limit || ''} onChange={e => setEditBudget({...editBudget, limit: Number(e.target.value)})} /></div>
                                
                                <div className="p-3 bg-blue-50 border border-blue-100 rounded-lg space-y-2">
                                    <label className="block text-sm font-bold text-primary">自動套用分類 (多選)</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        {categories.filter(c => c.type === 'expense').map(c => (
                                            <label key={c.id} className="flex items-center gap-1.5 text-sm text-dark cursor-pointer">
                                                <input type="checkbox" 
                                                       className="rounded text-primary focus:ring-primary w-4 h-4 border-gray-300"
                                                       checked={(editBudget?.targetCategories || []).includes(c.name)}
                                                       onChange={(e) => {
                                                           const current = new Set(editBudget?.targetCategories || []);
                                                           if(e.target.checked) current.add(c.name);
                                                           else current.delete(c.name);
                                                           setEditBudget({...editBudget, targetCategories: Array.from(current)});
                                                       }}
                                                />
                                                <span className="truncate">{c.name}</span>
                                            </label>
                                        ))}
                                    </div>
                                    <p className="text-[10px] text-blue-600/80 leading-tight mt-1">記帳時若選中這些分類，系統將預設套用此預算。您仍可在記帳表單手動修改為「不列入預算」。</p>
                                </div>

                                <div><label className="block text-sm font-medium text-gray-700 mb-1">結算日 (每月)</label><div className="flex items-center gap-2"><span className="text-gray-500 font-bold">每月</span><select className="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-1 focus:ring-primary outline-none" value={editBudget?.resetDay || 31} onChange={e => setEditBudget({...editBudget, resetDay: parseInt(e.target.value)})}>{[...Array(31)].map((_, i) => <option key={i+1} value={i+1}>{i+1} 號</option>)}</select></div></div>
                                <button onClick={() => { 
                                    const budgetData = { ...editBudget, limit: Number(editBudget.limit), resetDay: editBudget.resetDay || 31, targetCategories: editBudget.targetCategories || [] };
                                    if(budgetData.id) setBudgets(p=>p.map(x=>x.id===budgetData.id?budgetData:x)); else setBudgets(p=>[...p, {...budgetData, id:generateId()}]);
                                    setModalOpen(false);
                                }} className="w-full py-3 bg-primary text-white font-bold rounded-lg mt-4 shadow-lg active:scale-95 transition-transform">儲存預算設定</button>
                            </div>
                        </Modal>
                     </div>
                 );
            };

            const [editingTx, setEditingTx] = useState(null);
            const [txModalOpen, setTxModalOpen] = useState(false);

            const renderContent = () => {
                switch(view) {
                    case 'dashboard': return <DashboardView />;
                    case 'accounts': return <AccountsView />;
                    case 'transactions': return <TransactionsView />;
                    case 'budgets': return <BudgetsView />;
                    case 'menu': return <MenuView />;
                    case 'recurring': return <RecurringView />;
                    case 'reconcile': 
                        return <ReconcileView 
                            accounts={accounts} transactions={transactions}
                            subViewData={subViewData} setSubViewData={setSubViewData}
                            subViewDate={subViewDate} setSubViewDate={setSubViewDate}
                            defaultClosingDay={settings.cycleStartDay}
                            setView={setView} onToggleReconcile={handleToggleReconcile}
                        />;
                    case 'categories': return <CategoryView />;
                    case 'accountDetail': 
                         const acc = accounts.find(a => a.id === subViewData);
                         const { start: accStart, end: accEnd } = getAccountDetailRange(subViewDate, acc, settings.cycleStartDay);
                         
                         const accTx = transactions.filter(t => {
                             const d = parseDate(t.date);
                             return (t.accountId === subViewData || t.toAccountId === subViewData) && d >= accStart && d <= accEnd;
                         }).sort((a, b) => b.date.localeCompare(a.date));

                         let periodTotal = 0;
                         accTx.forEach(t => {
                             if (t.accountId === acc.id) {
                                 if (t.type === 'income') periodTotal += Number(t.amount);
                                 else if (t.type === 'expense' || t.type === 'transfer') periodTotal -= Number(t.amount);
                             }
                             if (t.toAccountId === acc.id && t.type === 'transfer') periodTotal += Number(t.amount);
                         });

                         const changeDetailMonth = (delta) => {
                             const newDate = new Date(subViewDate);
                             newDate.setMonth(newDate.getMonth() + delta);
                             setSubViewDate(newDate);
                         };

                         return (
                            <div className="h-full flex flex-col">
                                <div className="flex items-center justify-between mb-4">
                                    <button onClick={() => setView('accounts')} className="text-primary font-bold flex items-center gap-1"><Icon name="arrow_back"/> 返回</button>
                                    <h2 className="text-xl font-bold truncate max-w-[150px]">{acc?.name}</h2>
                                    <div className="w-16"></div>
                                </div>
                                
                                <div className="mb-4">
                                    <DateController 
                                        currentDate={subViewDate} onChangeDate={changeDetailMonth} 
                                        cycleStart={accStart} cycleEnd={accEnd} 
                                        isCreditCard={acc.type === 'credit'}
                                        creditCardInfo={acc.statementDate ? `結帳日: 每月 ${acc.statementDate} 號` : null}
                                        cycleDay={acc.cycleStartDay || settings.cycleStartDay}
                                        onCycleDayChange={(val) => {
                                            const newVal = parseInt(val);
                                            const updatedAccounts = accounts.map(a => a.id === acc.id ? {...a, cycleStartDay: newVal} : a);
                                            setAccounts(updatedAccounts);
                                        }}
                                        showTotal={true} periodTotal={periodTotal}
                                    />
                                </div>

                                <div className="flex-1 overflow-y-auto bg-white rounded-xl shadow-sm border border-gray-100 pb-20">
                                    {accTx.length > 0 ? accTx.map(t => {
                                        // 確保轉帳時作為扣款方的正確顯示
                                        const isSpending = t.type === 'expense' || (t.type === 'transfer' && t.accountId === acc.id);
                                        const extendedTx = { ...t, displayNegative: isSpending, isNeutral: false };
                                        return <TransactionItem key={t.id} t={extendedTx} accounts={accounts} onClick={() => { setEditingTx(t); setTxModalOpen(true); }} />;
                                    }) : <div className="p-8 text-center text-gray-400">本週期無交易紀錄</div>}
                                </div>
                            </div>
                        );
                     case 'budgetDetail':
                         const bud = budgets.find(b => b.id === subViewData);
                         const { start: bCycleStart, end: bCycleEnd } = getCycleRange(subViewDate, bud?.resetDay || 31);
                         
                         // 優化邏輯：加入 t.type === 'expense' 嚴謹過濾條件
                         const bTx = transactions.filter(t => {
                             return t.budgetId === subViewData && t.type === 'expense' && parseDate(t.date) >= bCycleStart && parseDate(t.date) <= bCycleEnd;
                         }).sort((a, b) => b.date.localeCompare(a.date));
                         
                         // 整合：分類 + 支付方式統計 (二維度交叉分析)
                         const combinedBreakdown = bTx.reduce((acc_map, t) => {
                             const catName = t.category || '未分類';
                             const account = accounts.find(a => a.id === t.accountId);
                             const isCredit = account?.type === 'credit';
                             
                             if (!acc_map[catName]) {
                                 acc_map[catName] = { total: 0, credit: 0, cash: 0 };
                             }
                             
                             const amt = Number(t.amount);
                             acc_map[catName].total += amt;
                             if (isCredit) {
                                 acc_map[catName].credit += amt;
                             } else {
                                 acc_map[catName].cash += amt;
                             }
                             
                             return acc_map;
                         }, {});
                         const breakdownArr = Object.entries(combinedBreakdown).map(([cat, data]) => ({cat, ...data})).sort((a,b) => b.total - a.total);

                         // 新增：計算該預算下的所有刷卡總額與現金總額
                         let totalBudgetCredit = 0;
                         let totalBudgetCash = 0;
                         breakdownArr.forEach(b => {
                             totalBudgetCredit += b.credit;
                             totalBudgetCash += b.cash;
                         });

                         const changeBudgetMonth = (delta) => {
                             const newDate = new Date(subViewDate);
                             newDate.setMonth(newDate.getMonth() + delta);
                             setSubViewDate(newDate);
                         };

                         return (
                             <div className="h-full flex flex-col">
                                <div className="flex items-center justify-between mb-4 shrink-0">
                                    <button onClick={() => setView('dashboard')} className="text-primary font-bold flex items-center gap-1"><Icon name="arrow_back"/> 返回</button>
                                    <h2 className="text-xl font-bold truncate">{bud?.name}</h2>
                                    <div className="w-16"></div>
                                </div>
                                
                                <div className="mb-4 shrink-0">
                                     <DateController 
                                        currentDate={subViewDate} onChangeDate={changeBudgetMonth} 
                                        cycleStart={bCycleStart} cycleEnd={bCycleEnd} 
                                        isCreditCard={true} 
                                        creditCardInfo={`結算日: 每月 ${bud.resetDay || 31} 號`}
                                    />
                                </div>
                                
                                <div className="flex-1 overflow-y-auto space-y-4 pb-20">
                                    {/* 整合版：分類與支付方式花費排行榜 */}
                                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-sm font-bold text-gray-500 flex items-center gap-2"><Icon name="analytics" size="text-lg"/> 分類與支付方式分析</h3>
                                            <div className="flex gap-2 text-[10px] font-bold">
                                                <span className="flex items-center gap-1 text-orange-600 bg-orange-50 border border-orange-100 px-2 py-1 rounded"><Icon name="credit_card" size="text-[12px]"/> {formatMoney(totalBudgetCredit)}</span>
                                                <span className="flex items-center gap-1 text-blue-600 bg-blue-50 border border-blue-100 px-2 py-1 rounded"><Icon name="payments" size="text-[12px]"/> {formatMoney(totalBudgetCash)}</span>
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            {breakdownArr.map((b, idx) => {
                                                const maxAmt = breakdownArr[0]?.total || 1;
                                                const totalPercent = (b.total / maxAmt) * 100;
                                                const creditPercent = b.total > 0 ? (b.credit / b.total) * 100 : 0;
                                                const cashPercent = b.total > 0 ? (b.cash / b.total) * 100 : 0;

                                                return (
                                                    <div key={b.cat} className="flex flex-col gap-1.5 p-3 bg-gray-50 rounded-lg">
                                                        <div className="flex justify-between items-center text-sm">
                                                            <span className="font-bold text-dark">{b.cat}</span>
                                                            <span className="font-bold text-danger">{formatMoney(b.total)}</span>
                                                        </div>
                                                        
                                                        {/* 雙色堆疊進度條 */}
                                                        <div className="flex h-1.5 rounded-full overflow-hidden w-full bg-gray-200">
                                                            {b.credit > 0 && <div className="bg-orange-400" style={{ width: `${creditPercent}%` }}></div>}
                                                            {b.cash > 0 && <div className="bg-blue-400" style={{ width: `${cashPercent}%` }}></div>}
                                                        </div>
                                                        
                                                        <div className="flex justify-between text-[10px] text-gray-500 font-bold mt-0.5">
                                                            <span className="flex items-center gap-1">
                                                                <span className={`w-2 h-2 rounded-sm ${b.credit > 0 ? 'bg-orange-400' : 'bg-gray-300'}`}></span> 
                                                                刷卡 {formatMoney(b.credit)}
                                                            </span>
                                                            <span className="flex items-center gap-1">
                                                                <span className={`w-2 h-2 rounded-sm ${b.cash > 0 ? 'bg-blue-400' : 'bg-gray-300'}`}></span> 
                                                                現金 {formatMoney(b.cash)}
                                                            </span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            {breakdownArr.length === 0 && <div className="text-xs text-gray-400 text-center py-2">無花費統計</div>}
                                        </div>
                                    </div>

                                    {/* 交易清單 */}
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                        <h3 className="text-sm font-bold p-4 pb-2 text-gray-500 border-b border-gray-50">套用此預算之交易明細</h3>
                                        {bTx.length > 0 ? bTx.map(t => {
                                            return <TransactionItem key={t.id} t={{...t, displayNegative: true}} accounts={accounts} onClick={() => { setEditingTx(t); setTxModalOpen(true); }} />;
                                        }) : <div className="p-8 text-center text-gray-400">本預算週期段無支出紀錄</div>}
                                    </div>
                                </div>
                             </div>
                         );
                    default: return <DashboardView />;
                }
            };

            return (
                <div className="flex flex-col h-full bg-background-light relative">
                    <header className="px-5 py-4 pt-safe-top bg-white border-b border-gray-100 flex justify-between items-center sticky top-0 z-10 shrink-0">
                        <h1 className="text-xl font-black text-primary tracking-tight">MyMoney</h1>
                    </header>
                    <main className="flex-1 overflow-y-auto p-4 pb-32">
                        {renderContent()}
                    </main>
                    
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 grid grid-cols-5 items-center pb-safe pt-2 z-40">
                        <button onClick={() => setView('dashboard')} className={`flex flex-col items-center w-full py-1 active:scale-95 transition-transform ${view === 'dashboard' ? 'text-primary' : 'text-gray-400 hover:text-gray-600'}`}>
                            <Icon name="dashboard" className={view === 'dashboard' ? 'filled' : ''} />
                            <span className="text-[10px] font-bold mt-0.5">首頁</span>
                        </button>
                        <button onClick={() => setView('accounts')} className={`flex flex-col items-center w-full py-1 active:scale-95 transition-transform ${view === 'accounts' ? 'text-primary' : 'text-gray-400 hover:text-gray-600'}`}>
                            <Icon name="account_balance_wallet" className={view === 'accounts' ? 'filled' : ''} />
                            <span className="text-[10px] font-bold mt-0.5">帳戶</span>
                        </button>
                        
                        <div className="relative -top-6 flex justify-center w-full">
                            <button 
                                onClick={() => { 
                                    if (accounts.length === 0) {
                                        showAlert('提示', '請先至「帳戶」分頁新增至少一個帳戶，才能開始記帳。');
                                        return;
                                    }
                                    const defaultCat = categories.find(c=>c.type==='expense')?.name || '';
                                    // Default Budget Auto-bind Check
                                    const matchingBudget = budgets.find(b => b.targetCategories?.includes(defaultCat));
                                    
                                    setEditingTx({ date: formatDate(new Date()), type: 'expense', amount: '', payee: '', accountId: accounts.find(a => a.type !== 'credit')?.id || accounts[0]?.id, category: defaultCat, subcategory: categories.find(c=>c.type==='expense')?.subcategories?.[0] || '', budgetId: matchingBudget ? matchingBudget.id : '', note: '' }); 
                                    setTxModalOpen(true); 
                                }} 
                                className="w-14 h-14 bg-primary text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform hover:bg-primary-hover border-4 border-white"
                            >
                                <Icon name="add" size="text-3xl" />
                            </button>
                        </div>

                        <button onClick={() => { if(view !== 'transactions') setSubViewDate(getInitialDateForCycle(settings.cycleStartDay)); setView('transactions'); }} className={`flex flex-col items-center w-full py-1 active:scale-95 transition-transform ${view === 'transactions' ? 'text-primary' : 'text-gray-400 hover:text-gray-600'}`}>
                            <Icon name="receipt_long" className={view === 'transactions' ? 'filled' : ''} />
                            <span className="text-[10px] font-bold mt-0.5">明細</span>
                        </button>
                        <button onClick={() => setView('menu')} className={`flex flex-col items-center w-full py-1 active:scale-95 transition-transform ${view === 'menu' ? 'text-primary' : 'text-gray-400 hover:text-gray-600'}`}>
                            <Icon name="menu" className={view === 'menu' ? 'filled' : ''} />
                            <span className="text-[10px] font-bold mt-0.5">更多</span>
                        </button>
                    </nav>

                    <TransactionFormModal isOpen={txModalOpen} onClose={() => setTxModalOpen(false)} initialData={editingTx} onSave={handleSaveTransaction} onDelete={handleDeleteTransaction} />
                    <ConfirmDialog isOpen={dialog.isOpen} title={dialog.title} message={dialog.message} onConfirm={dialog.onConfirm} onCancel={closeDialog} isAlert={dialog.isAlert} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
